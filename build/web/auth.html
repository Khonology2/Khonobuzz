<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth Redirect</title>
  </head>
  <body>
    <script>
      // Minimal redirect handler for MSAL/AAD implicit/PKCE flows.
      // This page only needs to exist so the auth library can complete the flow.
      // It will close itself if opened as a popup; otherwise redirect back to root.
      try {
        if (window.opener && !window.opener.closed) {
          window.opener.postMessage(location.href, '*');
          window.close();
        } else if (window.parent && window.parent !== window) {
          window.parent.postMessage(location.href, '*');
        } else {
          // Fallback: navigate back to root
          window.location.replace('/');
        }
      } catch (e) {
        console.error('Auth redirect handling failed', e);
        window.location.replace('/');
      }
    </script>
  </body>
</html>
