version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - HOST=0.0.0.0
      - PORT=5000
      - DEBUG=true
      # Firebase credentials paths (mount credentials as volumes)
      - PDH_FIREBASE_CREDENTIALS_PATH=/app/credentials/pdh-fe6eb-firebase-adminsdk-fbsvc-2700680531.json
      - FIREBASE_CREDENTIALS_PATH=/app/credentials/khonology-buzz-build-web-app-firebase-adminsdk-fbsvc-539b11f7f3.json
      # Security keys (should be overridden in production)
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-PudwjIQa-kMPoQ8KCE9OqN3-HnIu2P12Dkf2U6rFH8I=}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-50g5j-Pa1SXyyABDbrghP0Spo1lZnQIGoWAIZBM_zZ0=}
      # Database URL (should be overridden in production)
      - DATABASE_URL=${DATABASE_URL:-postgresql://sowbuilder_user:KKdN0nfyI4fF4LgmUXUePhCQN1SNjhQa@dpg-d5druhmr433s73anst30-a.virginia-postgres.render.com:5432/sowbuilder}
      - BACKEND_URL=${BACKEND_URL:-https://khonobuzz-backend-ac0j.onrender.com}
    volumes:
      # Mount Firebase credentials (you need to copy them to ./credentials/)
      - ./credentials:/app/credentials:ro
      # Mount logs directory
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - khonology-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Add PostgreSQL if you want to run it locally
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=sowbuilder
      - POSTGRES_USER=sowbuilder_user
      - POSTGRES_PASSWORD=KKdN0nfyI4fF4LgmUXUePhCQN1SNjhQa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - khonology-network
    profiles:
      - local-db

volumes:
  postgres_data:

networks:
  khonology-network:
    driver: bridge
