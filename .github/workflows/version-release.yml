name: Version Control Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Get current version
      id: current_version
      run: |
        # Extract current version from version_control.dart
        YEAR=$(grep "static const int _versionYear" lib/widgets/version_control.dart | sed 's/.*= \([0-9]*\).*/\1/')
        MONTH=$(grep "static const String _versionMonth" lib/widgets/version_control.dart | sed "s/.*= '\([0-9]*\)'.*/\1/")
        WEEK_CODE=$(grep "static const String _versionWeekCode" lib/widgets/version_control.dart | sed "s/.*= '\([A-Z]\)'.*/\1/")
        DAY_CODE=$(grep "static const String _versionDayCode" lib/widgets/version_control.dart | sed "s/.*= '\([A-Z]\)'.*/\1/")
        COMMIT_COUNT=$(grep "static const int _versionCommitNumber" lib/widgets/version_control.dart | sed 's/.*= \([0-9]*\).*/\1/')
        ENVIRONMENT=$(grep "static const String _versionEnvironment" lib/widgets/version_control.dart | sed "s/.*= '\([A-Z]*\)'.*/\1/")
        
        CURRENT_VERSION="Ver. $YEAR.$MONTH.$WEEK_CODE$DAY_CODE$COMMIT_COUNT.$ENVIRONMENT"
        
        echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
        echo "year=$YEAR" >> $GITHUB_OUTPUT
        echo "month=$MONTH" >> $GITHUB_OUTPUT
        echo "week_code=$WEEK_CODE" >> $GITHUB_OUTPUT
        echo "day_code=$DAY_CODE" >> $GITHUB_OUTPUT
        echo "commit_count=$COMMIT_COUNT" >> $GITHUB_OUTPUT
        echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT

    - name: Generate release notes
      id: release_notes
      run: |
        # Get commits since last tag
        LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
        
        if [[ -n "$LAST_TAG" ]]; then
          COMMITS_SINCE_TAG=$(git log $LAST_TAG..HEAD --oneline --pretty=format:"- %s (%an)" | head -20)
        else
          COMMITS_SINCE_TAG=$(git log --oneline --pretty=format:"- %s (%an)" | head -20)
        fi
        
        # Create release notes
        cat > release_notes.md << EOF
        # Version ${{ steps.current_version.outputs.current_version }}
        
        ## 🚀 Release Information
        - **Version**: ${{ steps.current_version.outputs.current_version }}
        - **Year**: ${{ steps.current_version.outputs.year }}
        - **Month**: ${{ steps.current_version.outputs.month }}
        - **Week Code**: ${{ steps.current_version.outputs.week_code }}
        - **Day Code**: ${{ steps.current_version.outputs.day_code }}
        - **Total Commits**: ${{ steps.current_version.outputs.commit_count }}
        - **Environment**: ${{ steps.current_version.outputs.environment }}
        
        ## 📝 Recent Changes
        $COMMITS_SINCE_TAG
        
        ## 🔧 Build Information
        - **Branch**: ${{ github.ref_name }}
        - **Commit**: ${{ github.sha }}
        - **Build Date**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
        
        ---
        *This release was automatically generated by GitHub Actions*
        EOF
        
        echo "release_notes_file=release_notes.md" >> $GITHUB_OUTPUT

    - name: Create Release
      id: create_release
      run: |
        # Create release using GitHub CLI
        gh release create "v${{ steps.current_version.outputs.current_version }}" \
          --title "Version ${{ steps.current_version.outputs.current_version }}" \
          --notes-file "${{ steps.release_notes.outputs.release_notes_file }}" \
          --latest \
          ${{ steps.current_version.outputs.environment != 'PROD' && '--prerelease' || '' }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload version artifact
      run: |
        # Upload asset to release using GitHub CLI
        gh release upload "v${{ steps.current_version.outputs.current_version }}" \
          assets/data/daily-commits.json \
          --clobber
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create release summary
      run: |
        echo "## 🎉 Release Created Successfully!" >> $GITHUB_STEP_SUMMARY
        echo "- **Version**: ${{ steps.current_version.outputs.current_version }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Release Tag**: v${{ steps.current_version.outputs.current_version }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Environment**: ${{ steps.current_version.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Total Commits**: ${{ steps.current_version.outputs.commit_count }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Release Notes**: [View Release](https://github.com/${{ github.repository }}/releases/tag/v${{ steps.current_version.outputs.current_version }})" >> $GITHUB_STEP_SUMMARY
