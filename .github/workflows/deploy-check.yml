# 1) Flutter analyze + test
# 2) On khono-v2: pull latest, flutter build web, stamp build/web with source commit SHA,
#    commit + push build/web (always when SHA changes), wait, POST RENDER_DEPLOY_HOOK
#
# Render must serve pre-built files only (Static Site): buildCommand = no-op, publish = build/web.
# The version label (Ver … SIT) comes from assets/data/version.json bundled at build time — it must
# be committed to the branch you deploy, or CI will keep building the old version string.
#
# Secrets: RENDER_DEPLOY_HOOK = full URL from Render → Service → Settings → Deploy Hook
#          CYPRESS_BASE_URL, CYPRESS_RECORD_KEY, STAFF_E2E_EMAIL — for post-deploy E2E (khono-v2 only)

name: deploy-check

on:
  push:
    branches:
      - khono-v2
      - main
      - khono-test-cypress
  workflow_dispatch:

concurrency:
  group: deploy-check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  checks-build-deploy:
    if: ${{ !contains(github.event.head_commit.message || '', '[skip ci]') }}
    name: Flutter CI, web build, Render deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync branch (avoid stale checkout vs other bots)
        if: github.ref == 'refs/heads/khono-v2'
        run: |
          git fetch origin khono-v2
          git pull origin khono-v2 --rebase

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build web (for Render — not built on Render)
        if: github.ref == 'refs/heads/khono-v2'
        run: flutter build web --release --base-href /

      - name: Disable service worker in web bundle (avoid stale cached JS after deploy)
        if: github.ref == 'refs/heads/khono-v2'
        run: python3 tool/strip_web_service_worker.py

      - name: Stamp build with source commit (forces deploy when HEAD changes)
        if: github.ref == 'refs/heads/khono-v2'
        run: |
          mkdir -p build/web
          SOURCE_SHA=$(git rev-parse HEAD)
          printf '%s\n' "$SOURCE_SHA" > build/web/.ci-source-commit
          printf '{"sha":"%s","run_id":"%s","run_attempt":"%s"}\n' \
            "$SOURCE_SHA" "${GITHUB_RUN_ID}" "${GITHUB_RUN_ATTEMPT}" > build/web/.ci-build-meta.json

      - name: Commit and push build/web
        if: github.ref == 'refs/heads/khono-v2'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add build/web
          if git diff --staged --quiet; then
            echo "No build/web changes to commit"
          else
            git commit -m "chore: update Flutter web build [skip ci]"
            git fetch origin khono-v2
            if ! git pull origin khono-v2 --rebase; then
              echo "::error::Rebase failed (conflicts with origin/khono-v2). Resolve on the branch and re-run workflow."
              exit 1
            fi
            if ! git push origin khono-v2; then
              git pull origin khono-v2 --rebase
              git push origin khono-v2
            fi
          fi

      - name: Wait for GitHub default branch tip (Render clones latest)
        if: github.ref == 'refs/heads/khono-v2'
        run: sleep 20

      - name: Trigger Render deploy hook
        if: github.ref == 'refs/heads/khono-v2'
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "${RENDER_DEPLOY_HOOK}" ]; then
            echo "::error::RENDER_DEPLOY_HOOK is not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK"
          echo "Render deploy hook invoked successfully."

      - name: Deploy summary
        if: ${{ always() && github.ref == 'refs/heads/khono-v2' }}
        run: |
          echo "## deploy-check summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Branch built:** khono-v2 at commit \`$(git rev-parse HEAD)\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **build/web** includes \`.ci-source-commit\` (open \`https://<your-site>/.ci-source-commit\` after deploy to verify the live SHA)." >> "$GITHUB_STEP_SUMMARY"
          echo "- Render: use **only** the deploy hook after this workflow, or turn off auto-deploy on push so you never publish a commit before the bot updates \`build/web\`." >> "$GITHUB_STEP_SUMMARY"
          echo "- **Cypress** runs next (same workflow) on \`khono-v2\` after a 2-minute wait for Render." >> "$GITHUB_STEP_SUMMARY"

  cypress-e2e-after-deploy:
    name: Cypress E2E after Render
    needs: checks-build-deploy
    if: ${{ success() && github.ref == 'refs/heads/khono-v2' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify Cypress secrets
        env:
          BASE: ${{ secrets.CYPRESS_BASE_URL }}
          EMAIL: ${{ secrets.STAFF_E2E_EMAIL }}
          KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
        run: |
          missing=0
          if [ -z "${BASE}" ]; then echo "::error::Add secret CYPRESS_BASE_URL (your Render static URL)"; missing=1; fi
          if [ -z "${EMAIL}" ]; then echo "::error::Add secret STAFF_E2E_EMAIL"; missing=1; fi
          if [ -z "${KEY}" ]; then echo "::error::Add secret CYPRESS_RECORD_KEY"; missing=1; fi
          exit "${missing}"

      - name: Wait for Render deploy to complete
        run: |
          echo "Deploy hook already ran in the previous job. Waiting 120s for Render to publish and propagate."
          sleep 120
          echo "Starting Cypress against live site."

      - name: Cypress run (record to Cypress Cloud)
        env:
          CYPRESS_BASE_URL: ${{ secrets.CYPRESS_BASE_URL }}
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          CYPRESS_STAFF_TEST_EMAIL: ${{ secrets.STAFF_E2E_EMAIL }}
        run: npx cypress run --record
