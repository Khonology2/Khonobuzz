# 1) Flutter analyze + test
# 2) On main: pull latest, flutter build web, stamp build/web with source commit SHA,
#    commit + push build/web (always when SHA changes), wait, POST RENDER_DEPLOY_HOOK
#
# Render must serve pre-built files only (Static Site): buildCommand = no-op, publish = build/web.
# The version label (Ver … SIT) comes from assets/data/version.json bundled at build time — it must
# be committed to the branch you deploy, or CI will keep building old version string.
#
# Secrets: RENDER_DEPLOY_HOOK = full URL from Render → Service → Settings → Deploy Hook

name: deploy-check

on:
  push:
    branches:
      - khono_v4
      - khono-v4
      - main
  workflow_dispatch:

concurrency:
  group: deploy-check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  checks-build-deploy:
    if: ${{ !contains(github.event.head_commit.message || '', '[skip ci]') }}
    name: Flutter CI, web build, Render deploy
    runs-on: ubuntu-latest
    steps:
      - name: Resolve deploy branch eligibility
        id: branch
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"
          if [ "$BRANCH" = "main" ] || [ "$BRANCH" = "khono_v4" ] || [ "$BRANCH" = "khono-v4" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync branch (avoid stale checkout vs other bots)
        if: steps.branch.outputs.deploy == 'true'
        run: |
          BRANCH="${{ steps.branch.outputs.name }}"
          git fetch origin "$BRANCH"
          git pull origin "$BRANCH" --rebase

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build web (for Render — not built on Render)
        if: steps.branch.outputs.deploy == 'true'
        run: flutter build web --release --base-href /

      - name: Disable service worker in web bundle (avoid stale cached JS after deploy)
        if: steps.branch.outputs.deploy == 'true'
        run: python3 tool/strip_web_service_worker.py

      - name: Stamp build with source commit (forces deploy when HEAD changes)
        if: steps.branch.outputs.deploy == 'true'
        run: |
          mkdir -p build/web
          SOURCE_SHA=$(git rev-parse HEAD)
          printf '%s\n' "$SOURCE_SHA" > build/web/.ci-source-commit
          printf '{"sha":"%s","run_id":"%s","run_attempt":"%s"}\n' \
            "$SOURCE_SHA" "${GITHUB_RUN_ID}" "${GITHUB_RUN_ATTEMPT}" > build/web/.ci-build-meta.json

      - name: Commit and push build/web
        if: steps.branch.outputs.deploy == 'true'
        run: |
          BRANCH="${{ steps.branch.outputs.name }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add build/web
          if git diff --staged --quiet; then
            echo "No build/web changes to commit"
          else
            git commit -m "chore: update Flutter web build [skip ci]"
            git fetch origin "$BRANCH"
            if ! git pull origin "$BRANCH" --rebase; then
              echo "::error::Rebase failed (conflicts with origin/$BRANCH). Resolve on branch and re-run workflow."
              exit 1
            fi
            if ! git push origin "$BRANCH"; then
              git pull origin "$BRANCH" --rebase
              git push origin "$BRANCH"
            fi
          fi

      - name: Wait for GitHub default branch tip (Render clones latest)
        if: steps.branch.outputs.deploy == 'true'
        run: sleep 20

      - name: Trigger Render deploy hook
        if: steps.branch.outputs.deploy == 'true'
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "${RENDER_DEPLOY_HOOK}" ]; then
            echo "::error::RENDER_DEPLOY_HOOK is not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK"
          echo "Render deploy hook invoked successfully."

      - name: Deploy summary
        if: ${{ always() && steps.branch.outputs.deploy == 'true' }}
        run: |
          echo "## deploy-check summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Branch built:** ${{ steps.branch.outputs.name }} at commit \`$(git rev-parse HEAD)\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **build/web** includes \`.ci-source-commit\` (open \`https://<your-site>/.ci-source-commit\` after deploy to verify live SHA)." >> "$GITHUB_STEP_SUMMARY"
          echo "- Render: use **only** deploy hook after this workflow, or turn off auto-deploy on push so you never publish a commit before the bot updates \`build/web\`." >> "$GITHUB_STEP_SUMMARY"
