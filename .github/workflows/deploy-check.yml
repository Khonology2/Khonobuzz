# 1) Flutter analyze + test
# 2) On khono-v2: flutter build web, commit build/web, push, then POST RENDER_DEPLOY_HOOK
#
# Render must serve pre-built files only (Static Site): buildCommand = no-op, publish = build/web.
# Do NOT run flutter/npm build on Render — see render.yaml.
#
# Secrets: RENDER_DEPLOY_HOOK = full URL from Render → Service → Settings → Deploy Hook

name: deploy-check

on:
  push:
    branches:
      - khono-v2
      - main

concurrency:
  group: deploy-check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  checks-build-deploy:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    name: Flutter CI, web build, Render deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build web (for Render — not built on Render)
        if: github.ref == 'refs/heads/khono-v2'
        run: flutter build web --release --base-href /

      - name: Commit and push build/web
        if: github.ref == 'refs/heads/khono-v2'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add build/web
          if git diff --staged --quiet; then
            echo "No build/web changes to commit"
          else
            git commit -m "chore: update Flutter web build [skip ci]"
            git push origin khono-v2
          fi

      - name: Trigger Render deploy hook
        if: github.ref == 'refs/heads/khono-v2'
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "${RENDER_DEPLOY_HOOK}" ]; then
            echo "::error::RENDER_DEPLOY_HOOK is not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK"
          echo "Render deploy hook invoked successfully."
